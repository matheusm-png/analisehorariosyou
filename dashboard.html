<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads Inbound — YouRH</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
<style>
:root {
  --green:        #3CC13B;
  --green-d:      #2a9a29;
  --green-bg:     rgba(60,193,59,0.10);
  --orange:       #F97316;
  --orange-bg:    rgba(249,115,22,0.10);
  --purple:       #7C3AED;
  --purple-bg:    rgba(124,58,237,0.10);
  --red:          #ef4444;
  --red-bg:       rgba(239,68,68,0.10);
  --yellow:       #eab308;
  --bg:           #0d0f0d;
  --surf:         #111411;
  --surf2:        #171b17;
  --border:       #222722;
  --border2:      #2c332c;
  --text:         #eef2ee;
  --muted:        #546054;
  --muted2:       #869f86;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;min-height:100vh}

/* HEADER */
header{background:var(--surf);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:-.3px}
.logo-mark{width:30px;height:30px;border-radius:8px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#0d0f0d;letter-spacing:-1px}
.logo-sep{color:var(--border2);margin:0 2px}
.logo-sub{color:var(--muted2);font-weight:500;font-size:13px}
.hdr-right{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--muted);font-family:'Fira Code',monospace}
.live-badge{display:flex;align-items:center;gap:6px;background:var(--green-bg);border:1px solid rgba(60,193,59,.22);color:var(--green);padding:4px 11px;border-radius:20px;font-size:10px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* FILTERS */
.fbar{background:var(--surf);border-bottom:1px solid var(--border);padding:0 32px}
.finner{display:flex;flex-wrap:wrap;align-items:stretch}
.fsec{display:flex;align-items:center;gap:8px;padding:11px 20px 11px 0;margin-right:20px;border-right:1px solid var(--border)}
.fsec:last-of-type{border-right:none;margin-right:0}
.flabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);white-space:nowrap;margin-right:2px}
.pgroup{display:flex;flex-wrap:wrap;gap:4px}
.pill{padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.pill:hover{border-color:var(--green);color:var(--green)}
.p-g{background:var(--green);border-color:var(--green);color:#0d0f0d;font-weight:700}
.p-p{background:var(--purple);border-color:var(--purple);color:#fff;font-weight:700}
.p-o{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:700}
.reset-btn{margin-left:auto;padding:4px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;align-self:center}
.reset-btn:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
main{padding:22px 32px;display:flex;flex-direction:column;gap:18px}

/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.kpi{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.kpi.g::before{background:var(--green)}
.kpi.o::before{background:var(--orange)}
.kpi.p::before{background:var(--purple)}
.kpi.r::before{background:var(--red)}
.kpi.y::before{background:var(--yellow)}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:8px}
.kpi-val{font-size:30px;font-weight:800;line-height:1;font-family:'Fira Code',monospace}
.kpi-val.g{color:var(--green)}.kpi-val.o{color:var(--orange)}.kpi-val.p{color:var(--purple)}.kpi-val.r{color:var(--red)}.kpi-val.y{color:var(--yellow)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.4}

/* CARDS */
.card{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.ctitle{font-size:14px;font-weight:700;letter-spacing:-.2px;margin-bottom:3px}
.csub{font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.5}

/* HEATMAP */
.hm-wrap{overflow-x:auto}
.hmt{border-collapse:separate;border-spacing:3px}
.hmt th{font-family:'Fira Code',monospace;font-size:9px;color:var(--muted);font-weight:400;text-align:center;padding:2px;min-width:28px}
.hmt .rlbl{font-size:10px;font-weight:600;color:var(--muted2);padding-right:10px;white-space:nowrap;text-align:right;background:transparent!important;cursor:default}
.hmt .rlbl:hover{transform:none!important}
.hmt .fds-lbl{color:var(--orange)}
.hmc{width:28px;height:24px;border-radius:4px;cursor:default;transition:transform .1s}
.hmc:hover{transform:scale(1.4);z-index:50}
.hm-leg{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:10px;color:var(--muted)}
.hm-swatches{display:flex;gap:3px}
.hm-swatches span{width:20px;height:8px;border-radius:2px;display:block}

/* CHART */
.cwrap{position:relative}

/* JANELAS TABLE */
.jt{width:100%;border-collapse:collapse}
.jt thead tr{border-bottom:1px solid var(--border)}
.jt th{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700;padding:8px 12px;text-align:left}
.jt td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:12px}
.jt tr:last-child td{border-bottom:none}
.jt tbody tr:hover td{background:var(--surf2)}
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
.tag.g{background:var(--green-bg);color:var(--green)}
.tag.o{background:var(--orange-bg);color:var(--orange)}
.tag.p{background:var(--purple-bg);color:var(--purple)}
.tag.r{background:var(--red-bg);color:var(--red)}
.mbar{display:flex;align-items:center;gap:7px}
.mbar-bg{width:60px;height:5px;border-radius:3px;background:var(--border2);overflow:hidden}
.mbar-fill{height:5px;border-radius:3px;background:var(--orange)}

/* TOOLTIP */
#tip{position:fixed;background:var(--surf2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:11px;line-height:1.6;pointer-events:none;display:none;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#tip strong{color:var(--green);font-family:'Fira Code',monospace}

footer{text-align:center;padding:16px 32px;color:var(--muted);font-size:10px;border-top:1px solid var(--border)}

@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}}
@media(max-width:680px){header,.fbar,main{padding-left:16px;padding-right:16px}.kpi-row{grid-template-columns:repeat(2,1fr)}.fsec{border-right:none;width:100%;padding-right:0;margin-right:0}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">Y</div>
    <span>YouRH</span>
    <span class="logo-sep">/</span>
    <span class="logo-sub">Leads Inbound — Análise de Horários</span>
  </div>
  <div class="hdr-right">
    <span id="hdrRange">Dez/25 · Jan/26 · Fev/26 · Mar/26</span>
    <div class="live-badge"><div class="dot"></div>Atualizado</div>
  </div>
</header>

<div class="fbar">
  <div class="finner">
    <div class="fsec">
      <span class="flabel">Mês</span>
      <div class="pgroup" id="fMes">
        <button class="pill p-g" data-f="mes" data-v="todos">Todos</button>
        <button class="pill" data-f="mes" data-v="Dezembro 2025">Dez/25</button>
        <button class="pill" data-f="mes" data-v="Janeiro 2026">Jan/26</button>
        <button class="pill" data-f="mes" data-v="Fevereiro 2026">Fev/26</button>
        <button class="pill" data-f="mes" data-v="Março 2026">Mar/26</button>
      </div>
    </div>
    <div class="fsec">
      <span class="flabel">Status</span>
      <div class="pgroup" id="fStatus">
        <button class="pill p-g" data-f="status" data-v="todos">Todos</button>
        <button class="pill" data-f="status" data-v="Agendado">Agendado</button>
        <button class="pill" data-f="status" data-v="Agendamento q">Agend. Qualif.</button>
        <button class="pill" data-f="status" data-v="Agendamento nq">Agend. N.Q.</button>
        <button class="pill" data-f="status" data-v="Em tentativa">Em tentativa</button>
        <button class="pill" data-f="status" data-v="Descartado">Descartado</button>
      </div>
    </div>
    <div class="fsec">
      <span class="flabel">ICP — Porte</span>
      <div class="pgroup" id="fPorte">
        <button class="pill p-g" data-f="porte" data-v="todos">Todos</button>
        <button class="pill" data-f="porte" data-v="20-30">20–30</button>
        <button class="pill" data-f="porte" data-v="31-60">31–60</button>
        <button class="pill" data-f="porte" data-v="61-120">61–120</button>
        <button class="pill" data-f="porte" data-v="101-500">101–500</button>
        <button class="pill" data-f="porte" data-v="301-500">301–500</button>
        <button class="pill" data-f="porte" data-v="500+">500+</button>
      </div>
    </div>
    <div class="fsec">
      <span class="flabel">Origem</span>
      <div class="pgroup" id="fOrigem">
        <button class="pill p-g" data-f="origem" data-v="todos">Todos</button>
        <button class="pill" data-f="origem" data-v="pago">Pago</button>
        <button class="pill" data-f="origem" data-v="organico">Orgânico</button>
      </div>
    </div>
    <button class="reset-btn" id="resetBtn">↺ Resetar filtros</button>
  </div>
</div>

<main>
  <div class="kpi-row">
    <div class="kpi g"><div class="kpi-lbl">Total de Leads</div><div class="kpi-val g" id="kTotal">—</div><div class="kpi-sub" id="kTotalSub">no período</div></div>
    <div class="kpi p"><div class="kpi-lbl">Email Corporativo</div><div class="kpi-val p" id="kCorp">—</div><div class="kpi-sub" id="kCorpSub">proxy de qualificação</div></div>
    <div class="kpi o"><div class="kpi-lbl">Leads em FDS</div><div class="kpi-val o" id="kFds">—</div><div class="kpi-sub" id="kFdsSub">sáb + dom</div></div>
    <div class="kpi r"><div class="kpi-lbl">Fora do Horário</div><div class="kpi-val r" id="kFora">—</div><div class="kpi-sub" id="kForaSub">úteis após 18h</div></div>
    <div class="kpi y"><div class="kpi-lbl">Taxa Agendamento</div><div class="kpi-val y" id="kAgend">—</div><div class="kpi-sub" id="kAgendSub">leads agendados</div></div>
  </div>

  <div class="card">
    <div class="ctitle">Heatmap de Entrada — Dia × Hora</div>
    <div class="csub">Intensidade de leads por hora e dia da semana. Hover para ver o volume exato. Sáb e Dom destacados em laranja.</div>
    <div class="hm-wrap"><table class="hmt"><thead id="hmHead"></thead><tbody id="hmBody"></tbody></table>
    <div class="hm-leg"><span>Menos</span><div class="hm-swatches" id="hmLeg"></div><span>Mais</span><span style="margin-left:10px;color:var(--muted)">— hover nas células para o valor exato</span></div></div>
  </div>

  <div class="g2">
    <div class="card">
      <div class="ctitle">Volume por Hora</div>
      <div class="csub">Dias úteis (verde) vs finais de semana (laranja).</div>
      <div class="cwrap" style="height:250px"><canvas id="cHora"></canvas></div>
    </div>
    <div class="card">
      <div class="ctitle">Volume por Dia da Semana</div>
      <div class="csub">Total por dia. FDS destacado em laranja, dias úteis em roxo.</div>
      <div class="cwrap" style="height:250px"><canvas id="cDow"></canvas></div>
    </div>
  </div>

  <div class="card">
    <div class="ctitle">Janelas Críticas de Atendimento</div>
    <div class="csub">Faixas com maior concentração de leads fora do horário comercial (08h–17h45 úteis). Base para escala e plantão.</div>
    <table class="jt">
      <thead><tr><th>#</th><th>Janela</th><th>Tipo</th><th>Leads</th><th>% total</th><th>Email Corp.</th><th>Recomendação</th></tr></thead>
      <tbody id="jtBody"></tbody>
    </table>
  </div>
</main>

<footer>YouRH · Dashboard Leads Inbound · Dez/2025 – Mar/2026 · Dados exportados de LEADS GERAIS 2026</footer>

const state = { mes:'todos', status:'todos', porte:new Set(['todos']), origem:'todos' };

function filtered(){
  const pa=state.porte.has('todos');
  return RAW.filter(r=>{
    if(state.mes!=='todos'&&r.m!==state.mes)return false;
    if(state.status!=='todos'&&r.s!==state.status)return false;
    if(!pa&&!state.porte.has(r.p))return false;
    if(state.origem!=='todos'&&r.o!==state.origem)return false;
    return true;
  });
}

let cH=null,cD=null;

function render(){
  const d=filtered();
  kpis(d); heatmap(d); chartHora(d); chartDow(d); janelas(d);
}

function pct(n,t){return t?Math.round(n/t*100)+'%':'—';}
function sel(id,v){document.getElementById(id).textContent=v;}

function kpis(d){
  const t=d.length,corp=d.filter(r=>r.e==='Sim').length,
    fds=d.filter(r=>r.d>=5).length,
    ut=d.filter(r=>r.d<5),
    fora=ut.filter(r=>r.h>=18).length,
    ag=d.filter(r=>r.s==='Agendamento q'||r.s==='Agendado').length;
  sel('kTotal',t); sel('kTotalSub',t+' leads no período');
  sel('kCorp',pct(corp,t)); sel('kCorpSub',corp+' com e-mail corporativo');
  sel('kFds',pct(fds,t)); sel('kFdsSub',fds+' leads em sáb/dom');
  sel('kFora',pct(fora,t)); sel('kForaSub',fora+' leads após 18h (úteis)');
  sel('kAgend',pct(ag,t)); sel('kAgendSub',ag+' agendamentos confirmados');
}

const DAYS=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
const HM=[
  'rgba(255,255,255,.03)','rgba(60,193,59,.10)','rgba(60,193,59,.22)',
  'rgba(60,193,59,.38)','rgba(60,193,59,.55)','rgba(60,193,59,.72)',
  'rgba(249,115,22,.65)','rgba(249,115,22,.92)'
];

function hmCol(v,mx){
  if(!v)return HM[0];
  return HM[Math.min(Math.floor(v/mx*(HM.length-1)),HM.length-1)];
}

function heatmap(d){
  const g={};let mx=0;
  d.forEach(r=>{const k=r.d+'_'+r.h;g[k]=(g[k]||0)+1;if(g[k]>mx)mx=g[k];});
  let hh='<tr><th></th>';
  for(let h=0;h<24;h++)hh+='<th>'+String(h).padStart(2,'0')+'h</th>';
  document.getElementById('hmHead').innerHTML=hh+'</tr>';
  let bh='';
  for(let dd=0;dd<7;dd++){
    const fds=dd>=5;
    bh+='<tr><td class="hmc rlbl'+(fds?' fds-lbl':'')+'">'+ DAYS[dd]+'</td>';
    for(let h=0;h<24;h++){
      const v=g[dd+'_'+h]||0;
      bh+='<td class="hmc" style="background:'+hmCol(v,mx)+'" data-v="'+v+'" data-day="'+DAYS[dd]+'" data-h="'+String(h).padStart(2,'0')+'h" onmouseenter="ts(event,this)" onmouseleave="th()"></td>';
    }
    bh+='</tr>';
  }
  document.getElementById('hmBody').innerHTML=bh;
  document.getElementById('hmLeg').innerHTML=HM.map(c=>'<span style="background:'+c+'"></span>').join('');
}

function ts(e,el){
  const t=document.getElementById('tip');
  t.innerHTML='<strong>'+el.dataset.day+' '+el.dataset.h+'</strong><br>'+el.dataset.v+' lead'+(el.dataset.v!=1?'s':'');
  t.style.display='block';t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY-46)+'px';
}
function th(){document.getElementById('tip').style.display='none';}

function copts(){
  return{responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{labels:{color:'#546054',font:{family:'Plus Jakarta Sans',size:11},boxWidth:10,padding:12}},
      tooltip:{backgroundColor:'#171b17',borderColor:'#2c332c',borderWidth:1,
        titleColor:'#eef2ee',bodyColor:'#869f86',
        titleFont:{family:'Fira Code',size:11},bodyFont:{family:'Plus Jakarta Sans',size:11}}
    },
    scales:{
      x:{grid:{color:'rgba(34,39,34,.9)'},ticks:{color:'#546054',font:{family:'Fira Code',size:9},maxRotation:0}},
      y:{grid:{color:'rgba(34,39,34,.9)'},ticks:{color:'#546054',font:{family:'Plus Jakarta Sans',size:10}}}
    }
  };
}

function chartHora(d){
  const u=Array(24).fill(0),f=Array(24).fill(0);
  d.forEach(r=>{if(r.d>=5)f[r.h]++;else u[r.h]++;});
  const L=Array.from({length:24},(_,i)=>String(i).padStart(2,'0')+'h');
  if(cH)cH.destroy();
  cH=new Chart(document.getElementById('cHora'),{type:'bar',data:{labels:L,datasets:[
    {label:'Dias Úteis',data:u,backgroundColor:'rgba(60,193,59,.75)',borderRadius:3,borderSkipped:false},
    {label:'FDS',data:f,backgroundColor:'rgba(249,115,22,.80)',borderRadius:3,borderSkipped:false}
  ]},options:copts()});
}

function chartDow(d){
  const c=Array(7).fill(0);
  d.forEach(r=>c[r.d]++);
  if(cD)cD.destroy();
  const o={...copts()};o.plugins={...o.plugins,legend:{display:false}};
  cD=new Chart(document.getElementById('cDow'),{type:'bar',data:{labels:DAYS,datasets:[{
    label:'Leads',data:c,
    backgroundColor:c.map((_,i)=>i>=5?'rgba(249,115,22,.85)':'rgba(124,58,237,.70)'),
    borderRadius:5,borderSkipped:false
  }]},options:o});
}

const JAN=[
  {l:'Sábado 06h–10h',  t:'FDS manhã',       tc:'o', f:r=>r.d===5&&r.h>=6&&r.h<=10,  rec:'Plantão sáb. manhã'},
  {l:'Úteis 19h–22h',   t:'Pós-expediente',  tc:'r', f:r=>r.d<5&&r.h>=19&&r.h<=22,   rec:'Escala noturna'},
  {l:'Úteis 18h–19h',   t:'Saída expediente',tc:'r', f:r=>r.d<5&&r.h===18,           rec:'Overlap de turno'},
  {l:'Domingo 19h–22h', t:'FDS noite',        tc:'o', f:r=>r.d===6&&r.h>=19&&r.h<=22, rec:'Plantão dom. noite'},
  {l:'Sábado 19h–23h',  t:'FDS noite',        tc:'o', f:r=>r.d===5&&r.h>=19&&r.h<=23, rec:'Plantão sáb. noite'},
  {l:'Úteis 05h–07h',   t:'Manhã antecipada', tc:'p', f:r=>r.d<5&&r.h>=5&&r.h<=7,     rec:'Bot ou turno antecipado'},
];

function janelas(d){
  const t=d.length;
  const rows=JAN.map(j=>{
    const lds=d.filter(j.f);
    const corp=lds.filter(r=>r.e==='Sim').length;
    return{...j,n:lds.length,cp:lds.length?Math.round(corp/lds.length*100):0};
  }).sort((a,b)=>b.n-a.n);
  document.getElementById('jtBody').innerHTML=rows.map((j,i)=>`
    <tr>
      <td style="color:var(--muted);font-family:'Fira Code',monospace;font-size:11px">${i+1}</td>
      <td style="font-weight:700;font-size:13px">${j.l}</td>
      <td><span class="tag ${j.tc}">${j.t}</span></td>
      <td style="font-family:'Fira Code',monospace;font-size:20px;font-weight:700;color:var(--green)">${j.n}</td>
      <td style="color:var(--muted2);font-family:'Fira Code',monospace">${t?Math.round(j.n/t*100):0}%</td>
      <td><div class="mbar"><div class="mbar-bg"><div class="mbar-fill" style="width:${j.cp}%"></div></div><span style="color:var(--muted2);font-family:'Fira Code',monospace;font-size:11px">${j.cp}%</span></div></td>
      <td><span class="tag g">${j.rec}</span></td>
    </tr>`).join('');
}

// SINGLE-SELECT filters
['mes','status','origem'].forEach(f=>{
  document.querySelectorAll(\`.pill[data-f="${f}"]\`).forEach(btn=>{
    btn.addEventListener('click',()=>{
      state[f]=btn.dataset.v;
      document.querySelectorAll(\`.pill[data-f="${f}"]\`).forEach(b=>b.className='pill');
      btn.classList.add('p-g');
      render();
    });
  });
});

// MULTI-SELECT: porte
document.querySelectorAll('.pill[data-f="porte"]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const v=btn.dataset.v;
    if(v==='todos'){
      state.porte=new Set(['todos']);
      document.querySelectorAll('.pill[data-f="porte"]').forEach(b=>b.className='pill');
      btn.classList.add('p-g');
    } else {
      state.porte.delete('todos');
      document.querySelector('.pill[data-f="porte"][data-v="todos"]').className='pill';
      if(state.porte.has(v)){state.porte.delete(v);btn.className='pill';}
      else{state.porte.add(v);btn.classList.add('p-p');}
      if(state.porte.size===0){
        state.porte.add('todos');
        document.querySelector('.pill[data-f="porte"][data-v="todos"]').classList.add('p-g');
      }
    }
    render();
  });
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  state.mes=state.status=state.origem='todos';
  state.porte=new Set(['todos']);
  document.querySelectorAll('.pill').forEach(b=>b.className='pill');
  document.querySelectorAll('.pill[data-v="todos"]').forEach(b=>b.classList.add('p-g'));
  render();
});

render();
<\/script>
